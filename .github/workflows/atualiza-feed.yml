name: Atualiza feeds OLX (2x ao dia)

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: atualiza-feed
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixa o repositório
        uses: actions/checkout@v4

      - name: Prepara o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Feed HUGO - baixa o original do Vista
        env:
          VISTA_URL: ${{ secrets.VISTA_FEED_URL }}
        run: |
          if [ -z "$VISTA_URL" ]; then
            echo "ERRO: o secret VISTA_FEED_URL não está configurado."
            exit 1
          fi
          curl -fsSL --retry 3 --retry-delay 30 --max-time 1200 \
            -A "Mozilla/5.0 (compatible; LoboFeedBot/1.0)" \
            -o feed_original_hugo.xml "$VISTA_URL"
          test -s feed_original_hugo.xml || { echo "ERRO: download Hugo veio vazio."; exit 1; }
          echo "Download Hugo: $(du -h feed_original_hugo.xml | cut -f1)"

      - name: Feed HUGO - corrige, aplica destaques e valida
        run: python3 corrige_feed.py feed_original_hugo.xml feed-hugo.xml destaques_hugo.csv

      - name: Feed LOBO - baixa, corrige e valida
        env:
          VISTA_URL_LOBO: ${{ secrets.VISTA_FEED_URL_LOBO }}
        run: |
          if [ -z "$VISTA_URL_LOBO" ]; then
            echo "ERRO: o secret VISTA_FEED_URL_LOBO não está configurado."
            exit 1
          fi
          curl -fsSL --retry 3 --retry-delay 30 --max-time 1200 \
            -A "Mozilla/5.0 (compatible; LoboFeedBot/1.0)" \
            -o feed_original_lobo.xml "$VISTA_URL_LOBO"
          test -s feed_original_lobo.xml || { echo "ERRO: download Lobo veio vazio."; exit 1; }
          echo "Download Lobo: $(du -h feed_original_lobo.xml | cut -f1)"
          python3 corrige_feed.py feed_original_lobo.xml feed-lobo.xml destaques_lobo.csv

      - name: Publica (só se houver mudança)
        run: |
          git config user.name "robo-feed"
          git config user.email "actions@users.noreply.github.com"
          git add feed-hugo.xml feed-lobo.xml
          if git diff --cached --quiet; then
            echo "Feeds sem mudanças. Nada a publicar."
          else
            git commit -m "Atualiza feeds corrigidos ($(date -u +'%d/%m/%Y %H:%M UTC'))"
            git push
            echo "Feeds publicados. GitHub Pages atualiza em 1-2 min."
          fi
